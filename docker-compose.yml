services:
  rabbitmq:
    image: rabbitmq:management
    container_name: playoffs-rabbitmq
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: playoffs-api
    ports:
      - "5000:5000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: playoffs-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - Worker__RabbitMq__Host=rabbitmq
      - Worker__RabbitMq__Port=5672
      - Worker__RabbitMq__UserName=guest
      - Worker__RabbitMq__Password=guest
      - Worker__RabbitMq__Exchange=playoffs-exchange
      - Worker__RabbitMq__Queue=playoffs-queue
      - Worker__RabbitMq__RoutingKey=playoffs.event
      - Worker__Postgres__ConnectionString=Host=host.docker.internal;Port=5432;Database=playoffs;Username=postgres;Password=123456
      - Worker__Redis__ConnectionString=host.docker.internal:6379

volumes:
  rabbitmq_data:
